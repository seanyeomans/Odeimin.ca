<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — Odeimin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1><a href="index.html">Odeimin</a></h1>
  <nav>
    <a href="index.html">Gallery</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main>
  <div class="upload-form">
    <h2>Add a photo</h2>

    <div id="message" class="message" style="display:none"></div>

    <form id="upload-form" enctype="multipart/form-data">
      <div class="field">
        <label for="photo">Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" capture="environment" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Upload</button>
    </form>
  </div>
</main>

<footer>
  <p>&copy; <span id="year"></span> Christine Yeomans</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const form    = document.getElementById('upload-form');
  const msg     = document.getElementById('message');
  const btn     = document.getElementById('submit-btn');

  function showMessage(text, type) {
    msg.textContent = text;
    msg.className   = 'message ' + type;
    msg.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled    = true;
    btn.textContent = 'Uploading…';
    msg.style.display = 'none';

    const data = new FormData(form);
    try {
      const res  = await fetch('upload.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        showMessage('Photo uploaded successfully!', 'success');
        form.reset();
      } else {
        showMessage(json.message || 'Upload failed.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Upload';
    }
  });
</script>
</body>
</html>
