<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage — Odeimin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .manage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .manage-grid h3 {
      grid-column: 1 / -1;
      font-size: 1rem;
      font-weight: normal;
      color: var(--accent);
    }

    .manage-item {
      position: relative;
    }

    .manage-item img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--border);
    }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .delete-btn:hover {
      background: #cc3333;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html">Odeimin</a></h1>
  <nav>
    <a href="index.html">Gallery</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <div class="upload-form">
    <h2>Add a photo</h2>

    <div id="message" class="message" style="display:none"></div>

    <form id="upload-form" enctype="multipart/form-data">
      <div class="field">
        <label for="photo">Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" capture="environment" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Upload</button>
    </form>

    <div class="manage-grid" id="manage-grid" style="display:none">
      <h3>Your photos — tap &times; to delete</h3>
    </div>
  </div>
</main>

<footer>
  <p>&copy; <span id="year"></span> Noelle Boyle</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const form       = document.getElementById('upload-form');
  const msg        = document.getElementById('message');
  const btn        = document.getElementById('submit-btn');
  const pwdField   = document.getElementById('password');
  const manageGrid = document.getElementById('manage-grid');

  function showMessage(text, type) {
    msg.textContent   = text;
    msg.className     = 'message ' + type;
    msg.style.display = 'block';
  }

  // ── Upload ──────────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled    = true;
    btn.textContent = 'Uploading…';
    msg.style.display = 'none';

    const data = new FormData(form);
    try {
      const res  = await fetch('upload.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        showMessage('Photo uploaded!', 'success');
        form.reset();
        pwdField.value = data.get('password'); // keep password filled
        loadManageGrid();
      } else {
        showMessage(json.message || 'Upload failed.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Upload';
    }
  });

  // ── Manage grid ─────────────────────────────────────────────────
  function loadManageGrid() {
    fetch('gallery.php')
      .then((r) => r.json())
      .then((images) => {
        // Remove old thumbnails but keep the heading
        manageGrid.querySelectorAll('.manage-item').forEach((el) => el.remove());

        if (!images.length) {
          manageGrid.style.display = 'none';
          return;
        }

        manageGrid.style.display = 'grid';

        images.forEach((img) => {
          const item = document.createElement('div');
          item.className = 'manage-item';

          const thumb = document.createElement('img');
          thumb.src     = img.src;
          thumb.alt     = img.name;
          thumb.loading = 'lazy';

          const del = document.createElement('button');
          del.className   = 'delete-btn';
          del.textContent = '×';
          del.title       = 'Delete ' + img.name;
          del.addEventListener('click', () => deletePhoto(img, item));

          item.appendChild(thumb);
          item.appendChild(del);
          manageGrid.appendChild(item);
        });
      });
  }

  async function deletePhoto(img, itemEl) {
    const password = pwdField.value;
    if (!password) {
      showMessage('Enter your password first, then delete.', 'error');
      pwdField.focus();
      return;
    }

    if (!confirm('Delete this photo?')) return;

    const filename = img.src.replace('images/', '');
    const data     = new FormData();
    data.append('password', password);
    data.append('filename', filename);

    try {
      const res  = await fetch('delete.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        itemEl.remove();
        const remaining = manageGrid.querySelectorAll('.manage-item');
        if (!remaining.length) manageGrid.style.display = 'none';
      } else {
        showMessage(json.message || 'Delete failed.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    }
  }

  // Show the grid once the password field has been filled and user leaves it
  pwdField.addEventListener('change', () => {
    if (pwdField.value) loadManageGrid();
  });

  loadManageGrid();
</script>
</body>
</html>
