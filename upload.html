<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage — Odeimin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .manage-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .manage-grid h3 {
      grid-column: 1 / -1;
      font-size: 1rem;
      font-weight: normal;
      color: var(--accent);
    }

    .manage-grid .grid-hint {
      grid-column: 1 / -1;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: -0.5rem;
    }

    .manage-item {
      position: relative;
    }

    .manage-item img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--border);
    }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .delete-btn:hover {
      background: #cc3333;
    }

    .status-btn {
      position: absolute;
      bottom: 4px;
      left: 4px;
      height: 20px;
      padding: 0 7px;
      border: none;
      border-radius: 10px;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      line-height: 20px;
      white-space: nowrap;
    }

    .status-btn.available {
      background: rgba(74, 140, 74, 0.85);
      color: #fff;
    }

    .status-btn.available:hover {
      background: rgba(50, 110, 50, 0.95);
    }

    .status-btn.unavailable {
      background: rgba(90, 90, 90, 0.75);
      color: #eee;
    }

    .status-btn.unavailable:hover {
      background: rgba(60, 60, 60, 0.9);
    }

    .session-indicator {
      color: #4a8c4a;
      font-size: 0.75rem;
      font-style: italic;
      font-weight: normal;
      letter-spacing: 0;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html">Odeimin</a></h1>
  <nav>
    <a href="index.html">Gallery</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <div class="upload-form">
    <h2>Add a photo</h2>

    <div id="message" class="message" style="display:none"></div>

    <form id="upload-form" enctype="multipart/form-data">
      <div class="field">
        <label for="photo">Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" required>
      </div>
      <div class="field">
        <label>Availability</label>
        <div class="toggle-group">
          <label><input type="radio" name="status" value="available" checked><span>Available</span></label>
          <label><input type="radio" name="status" value="unavailable"><span>Unavailable</span></label>
        </div>
      </div>
      <div class="field">
        <label for="password">Password <span id="session-indicator" class="session-indicator" style="display:none">· session active</span></label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submit-btn">Upload</button>
    </form>

    <div class="manage-grid" id="manage-grid" style="display:none">
      <h3>Your photos</h3>
      <p class="grid-hint">Tap &times; to delete &middot; tap the coloured label to toggle availability</p>
    </div>
  </div>
</main>

<footer>
  <p>&copy; <span id="year"></span> Odeimin.ca</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const form       = document.getElementById('upload-form');
  const msg        = document.getElementById('message');
  const btn        = document.getElementById('submit-btn');
  const pwdField   = document.getElementById('password');
  const manageGrid = document.getElementById('manage-grid');
  const sessionIndicator = document.getElementById('session-indicator');

  // ── Session management ───────────────────────────────────────────
  const SESSION_TIMEOUT = 15 * 60 * 1000; // 15 minutes
  let inactivityTimer = null;

  function saveSession(password) {
    sessionStorage.setItem('odeimin_pwd', password);
    resetTimer();
    sessionIndicator.style.display = '';
  }

  function resetTimer() {
    clearTimeout(inactivityTimer);
    localStorage.setItem('odeimin_last_activity', Date.now().toString());
    inactivityTimer = setTimeout(expireSession, SESSION_TIMEOUT);
  }

  function expireSession() {
    sessionStorage.removeItem('odeimin_pwd');
    localStorage.removeItem('odeimin_last_activity');
    pwdField.value = '';
    sessionIndicator.style.display = 'none';
    showMessage('Session expired — please enter your password again.', 'error');
  }

  function restoreSession() {
    const last = parseInt(localStorage.getItem('odeimin_last_activity') || '0');
    if (Date.now() - last >= SESSION_TIMEOUT) return;
    const pwd = sessionStorage.getItem('odeimin_pwd');
    if (!pwd) return;
    pwdField.value = pwd;
    sessionIndicator.style.display = '';
    resetTimer();
  }

  function requirePassword() {
    const password = pwdField.value;
    if (!password) {
      showMessage('Enter your password first.', 'error');
      pwdField.focus();
      return null;
    }
    return password;
  }

  // ── Messages ─────────────────────────────────────────────────────
  function showMessage(text, type) {
    msg.textContent   = text;
    msg.className     = 'message ' + type;
    msg.style.display = 'block';
  }

  // ── Upload ──────────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = requirePassword();
    if (!password) return;

    btn.disabled    = true;
    btn.textContent = 'Uploading…';
    msg.style.display = 'none';

    const data = new FormData(form);
    try {
      const res  = await fetch('upload.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        saveSession(password);
        showMessage('Photo uploaded!', 'success');
        form.reset();
        pwdField.value = password;
        loadManageGrid();
      } else {
        showMessage(json.message || 'Upload failed.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Upload';
    }
  });

  // ── Manage grid ─────────────────────────────────────────────────
  function loadManageGrid() {
    fetch('gallery.php')
      .then((r) => r.json())
      .then((images) => {
        manageGrid.querySelectorAll('.manage-item').forEach((el) => el.remove());

        if (!images.length) {
          manageGrid.style.display = 'none';
          return;
        }

        manageGrid.style.display = 'grid';

        images.forEach((img) => {
          const item = document.createElement('div');
          item.className = 'manage-item';

          const thumb = document.createElement('img');
          thumb.src     = img.src;
          thumb.alt     = img.name;
          thumb.loading = 'lazy';

          const del = document.createElement('button');
          del.className   = 'delete-btn';
          del.textContent = '×';
          del.title       = 'Delete ' + img.name;
          del.addEventListener('click', () => deletePhoto(img, item));

          const statusBtn = document.createElement('button');
          statusBtn.className   = 'status-btn ' + img.subdir;
          statusBtn.textContent = img.available ? 'Available' : 'Unavailable';
          statusBtn.title       = img.available
            ? 'Click to mark as Unavailable'
            : 'Click to mark as Available';
          statusBtn.addEventListener('click', () => toggleStatus(img, statusBtn));

          item.appendChild(thumb);
          item.appendChild(del);
          item.appendChild(statusBtn);
          manageGrid.appendChild(item);
        });
      });
  }

  async function deletePhoto(img, itemEl) {
    const password = requirePassword();
    if (!password) return;
    if (!confirm('Delete this photo?')) return;

    const data = new FormData();
    data.append('password', password);
    data.append('filename', img.filename);
    data.append('subdir',   img.subdir);

    try {
      const res  = await fetch('delete.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        saveSession(password);
        itemEl.remove();
        const remaining = manageGrid.querySelectorAll('.manage-item');
        if (!remaining.length) manageGrid.style.display = 'none';
      } else {
        showMessage(json.message || 'Delete failed.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    }
  }

  async function toggleStatus(img, btnEl) {
    const password = requirePassword();
    if (!password) return;

    const newSubdir = img.subdir === 'available' ? 'unavailable' : 'available';

    const data = new FormData();
    data.append('password', password);
    data.append('filename', img.filename);
    data.append('from',     img.subdir);
    data.append('to',       newSubdir);

    try {
      const res  = await fetch('move.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        saveSession(password);
        img.subdir    = newSubdir;
        img.available = newSubdir === 'available';
        img.src       = 'images/' + newSubdir + '/' + img.filename;

        btnEl.className   = 'status-btn ' + newSubdir;
        btnEl.textContent = img.available ? 'Available' : 'Unavailable';
        btnEl.title       = img.available
          ? 'Click to mark as Unavailable'
          : 'Click to mark as Available';
      } else {
        showMessage(json.message || 'Could not update status.', 'error');
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
    }
  }

  // ── Init ─────────────────────────────────────────────────────────
  restoreSession();
  loadManageGrid();
</script>
</body>
</html>
