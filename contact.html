<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Odeimin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .field textarea {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      min-height: 140px;
      border-radius: 0;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="index.html">Odeimin</a></h1>
  <nav>
    <a href="index.html">Gallery</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<main>
  <div class="upload-form">
    <h2>Get in touch</h2>

    <div id="message" class="message" style="display:none"></div>

    <form id="contact-form">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="body">Message</label>
        <textarea id="body" name="message" required></textarea>
      </div>
      <button type="submit" class="btn" id="submit-btn">Send</button>
    </form>
  </div>
</main>

<footer>
  <p>&copy; <span id="year"></span> Noelle Boyle</p>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const form = document.getElementById('contact-form');
  const msg  = document.getElementById('message');
  const btn  = document.getElementById('submit-btn');

  function showMessage(text, type) {
    msg.textContent   = text;
    msg.className     = 'message ' + type;
    msg.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled    = true;
    btn.textContent = 'Sending…';
    msg.style.display = 'none';

    const data = new FormData(form);
    try {
      const res  = await fetch('contact.php', { method: 'POST', body: data });
      const json = await res.json();
      if (json.ok) {
        showMessage(json.message, 'success');
        form.reset();
        form.style.display = 'none';
      } else {
        showMessage(json.message || 'Could not send message.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Send';
      }
    } catch {
      showMessage('Network error — please try again.', 'error');
      btn.disabled    = false;
      btn.textContent = 'Send';
    }
  });
</script>
</body>
</html>
